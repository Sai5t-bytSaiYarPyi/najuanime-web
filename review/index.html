  <link rel="stylesheet" href="/css/tailwind.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *{font-family:'Outfit',sans-serif;}
    :root{--blue:#3b82f6;--blue-dark:#1d4ed8;--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:rgba(255,255,255,0.07);--text:#e2e8f0;--muted:#64748b;}
    body{background:var(--bg);color:var(--text);min-height:100vh;}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#334155;border-radius:99px}
    header{background:rgba(15,17,23,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
    .back-btn{display:flex;align-items:center;gap:6px;color:#94a3b8;text-decoration:none;font-size:14px;font-weight:600;transition:color .2s}
    .back-btn:hover{color:var(--blue)}
    .logo-naju{color:var(--blue)}.logo-anime{color:white}
    .poster-wrap{border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.6)}
    .poster-wrap img{width:100%;display:block}
    .anime-title{font-size:28px;font-weight:900;color:white;line-height:1.2;letter-spacing:-.01em}
    @media(max-width:640px){.anime-title{font-size:22px}}
    .genre-badge{display:inline-flex;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);color:#c084fc}
    .stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;text-align:center;flex:1}
    .stat-box .val{font-size:18px;font-weight:900;color:white;line-height:1.2}
    .stat-box .lbl{font-size:11px;font-weight:600;color:var(--muted);margin-top:2px}
    .review-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px}
    .review-box h3{font-size:14px;font-weight:700;color:#60a5fa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    .review-text-body{font-size:14px;color:#94a3b8;line-height:1.85;white-space:pre-line}
    .watch-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:var(--blue);color:white;font-size:15px;font-weight:700;border-radius:14px;text-decoration:none;transition:background .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 20px rgba(59,130,246,.3)}
    .watch-btn:hover{background:var(--blue-dark);box-shadow:0 6px 28px rgba(59,130,246,.4);transform:translateY(-1px)}

    /* ── Stars ── */
    .star-row{display:flex;gap:5px}
    .star{width:28px;height:28px;cursor:pointer;color:#334155;transition:color .12s,transform .12s;flex-shrink:0}
    .star:hover,.star.on{color:#fbbf24;transform:scale(1.18)}
    .star svg{width:100%;height:100%}

    /* ── Rating Form ── */
    .rating-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px}
    .form-label{display:block;font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:8px}
    .form-input,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:white;border-radius:12px;padding:12px 16px;font-size:14px;font-family:'Outfit',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none;box-sizing:border-box}
    .form-input:focus,.form-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
    .form-input::placeholder,.form-textarea::placeholder{color:#475569}
    .form-textarea{resize:vertical;min-height:90px}
    .submit-btn{width:100%;padding:14px;background:var(--blue);color:white;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;border:none;border-radius:12px;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .submit-btn:hover{background:var(--blue-dark)}.submit-btn:disabled{opacity:.5;cursor:not-allowed}

    /* ── Avg Score ── */
    .avg-wrap{display:flex;align-items:center;gap:14px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15);border-radius:14px;padding:14px 18px;margin-bottom:16px}
    .avg-num{font-size:40px;font-weight:900;color:#fbbf24;line-height:1;flex-shrink:0}
    .avg-stars{display:flex;gap:3px;margin-bottom:4px}
    .avg-star{width:15px;height:15px;color:#fbbf24}
    .avg-star.e{color:#334155}
    .avg-sub{font-size:12px;color:#92400e;font-weight:600}

    /* ── Sort Tabs ── */
    .sort-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .sort-tab{padding:7px 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:#94a3b8;transition:all .15s;font-family:'Outfit',sans-serif}
    .sort-tab:hover{border-color:rgba(59,130,246,.3);color:white}
    .sort-tab.active{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.4);color:#60a5fa}

    /* ── User Review Card ── */
    .rev-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
    .rev-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
    .rev-name{font-size:13px;font-weight:700;color:white}
    .rev-date{font-size:11px;color:var(--muted)}
    .rating-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);color:#fbbf24;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
    .rev-text{font-size:13px;color:#94a3b8;line-height:1.7;white-space:pre-wrap;word-break:break-word}
    /* truncation */
    .rev-text.clamped{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
    .read-more-btn{background:none;border:none;color:#60a5fa;font-size:12px;font-weight:700;cursor:pointer;padding:4px 0;font-family:'Outfit',sans-serif;transition:color .15s}
    .read-more-btn:hover{color:#93c5fd}

    /* helpful */
    .helpful-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--bg2);color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;margin-top:8px}
    .helpful-btn:hover{border-color:rgba(59,130,246,.35);color:#60a5fa}
    .helpful-btn.voted{border-color:rgba(59,130,246,.4);color:#60a5fa;background:rgba(59,130,246,.08)}
    .helpful-btn:disabled{cursor:default;opacity:.7}

    /* load more */
    .load-more-btn{width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);color:#94a3b8;font-size:13px;font-weight:700;border-radius:12px;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;margin-top:12px}
    .load-more-btn:hover{background:#263248;color:white;border-color:rgba(59,130,246,.3)}
    .load-more-btn:disabled{opacity:.5;cursor:not-allowed}

    .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(--muted)}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    .sm-spin{width:16px;height:16px;border-width:2px;border-top-color:var(--blue);border-color:var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-state{text-align:center;padding:80px 20px;color:#f87171}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .4s ease both}

    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);padding:11px 22px;border-radius:99px;font-size:13px;font-weight:700;z-index:99;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{background:#1a2e1a;border:1px solid rgba(74,222,128,.3);color:#4ade80}
    .toast.err{background:#2e1a1a;border:1px solid rgba(248,113,113,.3);color:#f87171}

    @media(max-width:640px){
  .watch-btn{padding:11px 14px;font-size:13px;gap:7px}
  .submit-btn{padding:11px;font-size:13px}
  .star{width:22px;height:22px}
  .star-row{gap:3px}
  .sort-tab{padding:5px 10px;font-size:11px}
  .rating-card{padding:16px}
  .form-input,.form-textarea{padding:10px 12px;font-size:13px}
  .review-box{padding:16px}
  .review-box h3{font-size:12px;margin-bottom:12px}
  .review-text-body{font-size:13px}
  .stat-box{padding:10px 12px}
  .stat-box .val{font-size:15px}
  .stat-box .lbl{font-size:10px}
  .genre-badge{font-size:10px;padding:3px 9px}
  .load-more-btn{font-size:12px;padding:10px}
  .helpful-btn{font-size:10px;padding:4px 9px}
  .rev-card{padding:12px 13px}
  .rev-name{font-size:12px}
  .rev-text{font-size:12px}
  .avg-num{font-size:32px}
  .avg-wrap{padding:12px 14px;gap:10px}
  }

  /* Reply styles */
.reply-thread{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px}
.reply-item{display:flex;gap:8px;align-items:flex-start}
.reply-avatar{width:22px;height:22px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px}
.reply-bubble{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 11px}
.reply-text{font-size:12px;color:#94a3b8;line-height:1.6;word-break:break-word}
.reply-date{font-size:10px;color:#475569;margin-top:3px}
.reply-form{margin-top:10px;display:none}
.reply-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:white;border-radius:10px;padding:9px 13px;font-size:12px;font-family:'Outfit',sans-serif;resize:none;outline:none;min-height:60px;transition:border-color .2s;box-sizing:border-box}
.reply-input:focus{border-color:var(--blue)}
.reply-input::placeholder{color:#475569}
.reply-actions{display:flex;gap:7px;margin-top:7px}
.reply-btn-open{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--border);color:#64748b;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;margin-top:8px}
.reply-btn-open:hover{border-color:rgba(59,130,246,.35);color:#60a5fa}
.reply-send{padding:7px 14px;background:var(--blue);color:white;font-size:12px;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;transition:background .2s}
.reply-send:hover{background:var(--blue-dark)}
.reply-send:disabled{opacity:.5;cursor:not-allowed}
.reply-cancel{padding:7px 12px;background:var(--bg3);color:#94a3b8;font-size:12px;font-weight:600;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif}
.del-btn{background:none;border:none;color:#475569;font-size:10px;cursor:pointer;padding:2px 6px;border-radius:4px;font-family:'Outfit',sans-serif;transition:color .15s;margin-left:auto}
.del-btn:hover{color:#f87171}
  </style>
</head>
<body>

<header>
  <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="back-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      နောက်သို့
    </a>
    <a href="/" class="text-lg font-black tracking-tight">
      <span class="logo-naju">NaJu</span><span class="logo-anime">Anime</span>
      <span style="color:var(--muted);font-weight:600;font-size:13px;margin-left:4px">Review</span>
    </a>
    <div style="width:80px"></div>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-8" id="reviewContainer">
  <div class="loading-state"><div class="spinner"></div><span>Loading...</span></div>
</main>

<!-- Rating + Reviews section -->
<section class="max-w-4xl mx-auto px-4 pb-16" id="ratingsSection" style="display:none">

<!-- Rating + Reviews section — ဒီ rating-card div ကို replace ပါ -->
<div class="rating-card" style="margin-bottom:24px">
  <h2 style="font-size:16px;font-weight:700;color:#fbbf24;margin-bottom:4px">⭐ Rating ပေးရန်</h2>
  <p style="font-size:13px;color:var(--muted);margin-bottom:18px">Star နှိပ်ပြီး Rating ပေးသွားပါ ✨</p>

  <div style="margin-bottom:16px">
    <div class="star-row" id="starRow"></div>
    <p id="rLabel" style="font-size:13px;color:#fbbf24;margin-top:8px;font-weight:700;min-height:20px"></p>
  </div>

  <div style="margin-bottom:14px">
  <input id="rName" class="form-input" 
    placeholder="နာမည် (ထည့်ချင်ထည့်မထည့်ချင်နေ)" 
    maxlength="40">
  </div>

  <div style="margin-bottom:14px">
    <textarea id="rText" class="form-textarea" style="min-height:70px"
      placeholder="တိုတိုလေး ရေးချင်ရင်... (ထည့်ချင်ထည့်မထည့်ချင်နေ)"></textarea>
  </div>

  <button id="submitBtn" class="submit-btn" onclick="submitRating()">
    <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
    </svg>
    Rating ပေးမည်
  </button>


</div>

  <!-- Reviews list -->
  <div id="reviewsPanel"></div>

</section>

<div id="toast" class="toast"></div>

<script>
const WORKER_URL     = 'https://api.najuanime.com';
const urlParams      = new URLSearchParams(window.location.search);
const currentAnimeId = urlParams.get('id');

let selRating  = 0;
let curSort    = 'newest';
let curPage    = 1;
let isLoading  = false;

const LABELS = {1:'😭 မကောင်းဘူး',2:'😞 မကောင်းဘူး',3:'😐 သာမာန်',4:'🙂 ရပါတယ်',
  5:'😊 တော်တော်ကောင်းတယ်',6:'😄 ကောင်းတယ်',7:'🤩 အရမ်းကောင်းတယ်',
  8:'🔥 မိုက်တယ်!',9:'💥 Top-tier!',10:'👑 မာစတာပီး!'};

// helper
const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtN  = n => n>=1000 ? (n/1000).toFixed(1).replace('.0','')+'K' : String(n);
const starSvg = `<svg viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`;

// ── Stars Input ───────────────────────────────────────
function buildStars() {
  const row = document.getElementById('starRow');
  row.innerHTML = '';
  for (let i=1;i<=10;i++) {
    const s = document.createElement('span');
    s.className='star'; s.dataset.v=i;
    s.innerHTML=starSvg;
    s.onmouseenter = ()=>hlStars(i);
    s.onmouseleave = ()=>hlStars(selRating);
    s.onclick = ()=>{ selRating=i; hlStars(i); document.getElementById('rLabel').textContent=LABELS[i]||''; };
    row.appendChild(s);
  }
}
function hlStars(n) {
  document.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',+s.dataset.v<=n));
}

// ── Avg display ───────────────────────────────────────
function avgHtml(meta) {
  if (!meta||!meta.count) return '';
  const filled = Math.round(meta.avg/2);
  const stars  = Array.from({length:5},(_,i)=>`<svg class="avg-star${i<filled?'':' e'}" viewBox="0 0 20 20" fill="currentColor">${starSvg.slice(5,-6)}</svg>`).join('');
  // fix: use inner path directly
  const starFull = n => `<svg class="avg-star${n?'':' e'}" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`;
  const starsHtml = Array.from({length:5},(_,i)=>starFull(i<filled)).join('');
  return `<div class="avg-wrap">
    <div class="avg-num">${meta.avg}</div>
    <div>
      <div class="avg-stars">${starsHtml}</div>
      <div class="avg-sub">User ${fmtN(meta.count)} ယောက် Rating ပေးထားသည်</div>
    </div>
  </div>`;
}

// ── Render a single review card ───────────────────────
const votedSet = new Set(JSON.parse(localStorage.getItem('naju_voted')||'[]'));
function saveVoted() { localStorage.setItem('naju_voted', JSON.stringify([...votedSet])); }

function reviewCardHtml(rv) {
  const voted    = votedSet.has(rv.id);
  const longText = rv.text && rv.text.length > 180;
  const repliesHtml = (rv.replies || []).map(rep => `
    <div class="reply-item">
      <div class="reply-avatar">💬</div>
      <div class="reply-bubble">
        <div class="reply-text">${esc(rep.text)}</div>
        <div class="reply-date">${rep.date || ''}</div>
      </div>
    </div>`).join('');

  return `
    <div class="rev-card" id="rc-${rv.id}">
      <div class="rev-meta">
        <span class="rev-name">👤 ${esc(rv.name || 'Anonymous')}</span>
        <span class="rating-pill">⭐ ${rv.rating}/10</span>
        <span class="rev-date">${rv.date || ''}</span>
        <button class="del-btn" onclick="deleteReview('${rv.id}')" title="Report/Delete">🗑</button>
      </div>
      ${rv.text ? `
        <p class="rev-text${longText ? ' clamped' : ''}" id="rt-${rv.id}">${esc(rv.text)}</p>
        ${longText ? `<button class="read-more-btn" id="rm-${rv.id}" onclick="toggleRead('${rv.id}')">▼ ဆက်ဖတ်ရန်</button>` : ''}
      ` : ''}

      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <button class="helpful-btn${voted ? ' voted' : ''}" id="hb-${rv.id}"
          onclick="upvote('${rv.id}','${currentAnimeId}')" ${voted ? 'disabled' : ''}>
          👍 Helpful &nbsp;<span id="hc-${rv.id}">${fmtN(rv.helpful || 0)}</span>
        </button>
        <button class="reply-btn-open" onclick="toggleReplyForm('${rv.id}')">
          💬 Reply ${(rv.replies || []).length > 0 ? `(${rv.replies.length})` : ''}
        </button>
      </div>

      ${repliesHtml ? `<div class="reply-thread">${repliesHtml}</div>` : ''}

      <div class="reply-form" id="rf-${rv.id}">
        <textarea class="reply-input" id="ri-${rv.id}" placeholder="Reply ရေးပါ..."></textarea>
        <div class="reply-actions">
          <button class="reply-send" onclick="submitReply('${rv.id}')">Send</button>
          <button class="reply-cancel" onclick="toggleReplyForm('${rv.id}')">Cancel</button>
        </div>
      </div>
    </div>`;
}

function toggleRead(id) {
  const el  = document.getElementById(`rt-${id}`);
  const btn = document.getElementById(`rm-${id}`);
  if (!el||!btn) return;
  const clamped = el.classList.toggle('clamped');
  btn.textContent = clamped ? '▼ ဆက်ဖတ်ရန်' : '▲ ခဲ့ပြန်ပြ';
}

// ── Helpful upvote ────────────────────────────────────
async function upvote(revId, animeId) {
  const btn = document.getElementById(`hb-${revId}`);
  if (!btn||btn.disabled) return;
  btn.disabled=true;
  try {
    const r = await fetch(
      `${WORKER_URL}/reviews/${encodeURIComponent(animeId)}/${encodeURIComponent(revId)}/helpful`,
      { method:'POST' }
    );
    const d = await r.json();
    if (d.success) {
      document.getElementById(`hc-${revId}`).textContent = fmtN(d.helpful);
      btn.classList.add('voted');
      votedSet.add(revId); saveVoted();
    } else {
      // ← ဒါ ထည့်ပါ
      console.error('Helpful failed:', d);
      btn.disabled=false;
    }
  } catch(e) {
    console.error('Helpful error:', e);
    btn.disabled=false;
  }
}

// ── Load Reviews ──────────────────────────────────────
let reviewsData = [];  // accumulated across pages
let totalReviews = 0;
let hasMore = false;

async function loadReviews(reset=false) {
  if (isLoading) return;
  isLoading=true;
  if (reset) { reviewsData=[]; curPage=1; }

  const panel = document.getElementById('reviewsPanel');
  if (reset) {
    panel.innerHTML = `<div style="display:flex;justify-content:center;padding:24px"><div class="spinner" style="width:24px;height:24px;border-width:2px"></div></div>`;
  }

  try {
    const url = `${WORKER_URL}/reviews/${encodeURIComponent(currentAnimeId)}?sort=${curSort}&page=${curPage}`;
    const r   = await fetch(url);
    const d   = await r.json();
    reviewsData  = reset ? d.reviews : [...reviewsData, ...d.reviews];
    totalReviews = d.total;
    hasMore      = d.hasMore;
    renderReviews(d.meta, reset);
  } catch {
    panel.innerHTML = '<p style="color:#f87171;font-size:13px;padding:16px">Reviews load မရပါ</p>';
  }
  isLoading=false;
}

function renderReviews(meta, isReset) {
  const panel = document.getElementById('reviewsPanel');

  if (!reviewsData.length) {
    panel.innerHTML = `
      ${avgHtml(meta)}
      <div style="text-align:center;padding:40px 20px;color:var(--muted)">
        <div style="font-size:30px;margin-bottom:8px">💬</div>
        <p style="font-size:14px;font-weight:600">Review မရှိသေးဘူး</p>
        <p style="font-size:12px;margin-top:4px">ပထမဆုံး Rating ပေးသူ ဖြစ်ပါ!</p>
      </div>`;
    return;
  }

  const sortTabsHtml = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px">
      <h3 style="font-size:15px;font-weight:700;color:white;display:flex;align-items:center;gap:8px">
        ⭐ Reviews <span style="font-size:12px;font-weight:600;color:var(--muted)">(${fmtN(totalReviews)})</span>
      </h3>
      <div class="sort-tabs">
        <button class="sort-tab${curSort==='newest'?' active':''}" onclick="setSort('newest')">🕒 Newest</button>
        <button class="sort-tab${curSort==='top'?' active':''}"    onclick="setSort('top')">🏆 Top Rated</button>
        <button class="sort-tab${curSort==='helpful'?' active':''}" onclick="setSort('helpful')">👍 Most Helpful</button>
      </div>
    </div>`;

  const cardsHtml   = reviewsData.map(reviewCardHtml).join('');
  const loadMoreHtml = hasMore
    ? `<button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">
        ▼ နောက်ထပ် ဆက်ဖတ်ရန် (${fmtN(totalReviews - reviewsData.length)} ကျန်)
       </button>`
    : '';

  panel.innerHTML = `
    ${avgHtml(meta)}
    ${sortTabsHtml}
    <div style="display:flex;flex-direction:column;gap:10px">${cardsHtml}</div>
    ${loadMoreHtml}`;
}

function setSort(s) {
  if (curSort===s) return;
  curSort=s; curPage=1;
  loadReviews(true);
}

function loadMore() {
  const btn = document.getElementById('loadMoreBtn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="sm-spin" style="display:inline-block;vertical-align:middle;margin-right:6px"></span> Loading...'; }
  curPage++;
  loadReviews(false);
}

// ── Submit Rating ─────────────────────────────────────
async function submitRating() {
  if (!selRating) { showToast('⚠️ Star နှိပ်ပြီး Rating ပေးပါ!', false); return; }
  const btn  = document.getElementById('submitBtn');
  const text = document.getElementById('rText').value.trim();
  
  // ══ ဒီကြောင်း အသစ်ထည့် ══
  const name = document.getElementById('rName').value.trim();
  
  btn.disabled = true;
  btn.innerHTML = '<span class="sm-spin" style="display:inline-block;vertical-align:middle;margin-right:6px"></span> ပေးပို့နေသည်...';
  try {
    const r = await fetch(`${WORKER_URL}/reviews/${encodeURIComponent(currentAnimeId)}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        // ══ body ကို ဒီအတိုင်း အစားထိုး ══
        body: JSON.stringify({ rating: selRating, text, name }) });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || 'Error');
    showToast('✓ Rating ပေးပြီးပါပြီ! ကျေးဇူးပဲ 🙏');
    document.getElementById('rText').value = '';
    // ══ ဒီကြောင်း အသစ်ထည့် ══
    document.getElementById('rName').value = '';
    selRating = 0; hlStars(0);
    document.getElementById('rLabel').textContent = '';
    loadReviews(true);
  } catch { showToast('❌ ချိတ်ဆက်မှု မအောင်မြင်ပါ', false); }
  btn.disabled = false;
  btn.innerHTML = '<svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg> Rating ပေးမည်';
}

// ── Reply ──────────────────────────────────────────────
function toggleReplyForm(revId) {
  const form = document.getElementById(`rf-${revId}`);
  if (!form) return;
  const isOpen = form.style.display === 'block';
  form.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) document.getElementById(`ri-${revId}`)?.focus();
}

async function submitReply(revId) {
  const input = document.getElementById(`ri-${revId}`);
  const text  = input?.value.trim();
  if (!text) return;

  const btn = input.closest('.reply-form').querySelector('.reply-send');
  btn.disabled = true; btn.textContent = '...';

  try {
    const r = await fetch(
      `${WORKER_URL}/reviews/${encodeURIComponent(currentAnimeId)}/${encodeURIComponent(revId)}/reply`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }) }
    );
    const d = await r.json();
    if (!d.success) throw new Error(d.error);

    // UI ထဲ reply ထည့်
    let thread = document.querySelector(`#rc-${revId} .reply-thread`);
    if (!thread) {
      thread = document.createElement('div');
      thread.className = 'reply-thread';
      document.getElementById(`rf-${revId}`).before(thread);
    }
    thread.insertAdjacentHTML('beforeend', `
      <div class="reply-item">
        <div class="reply-avatar">💬</div>
        <div class="reply-bubble">
          <div class="reply-text">${esc(text)}</div>
          <div class="reply-date">${d.date || 'ယခု'}</div>
        </div>
      </div>`);

    input.value = '';
    toggleReplyForm(revId);
    showToast('✓ Reply ပေးပြီးပါပြီ!');
  } catch(e) {
    showToast('❌ Reply မပို့ရပါ', false);
  }
  btn.disabled = false; btn.textContent = 'Send';
}

// ── Delete Review (Admin or Report) ────────────────────
async function deleteReview(revId) {
  // Admin token မေးမည်
  const token = prompt('Admin password ထည့်ပါ (Report လုပ်ရန်ဆိုရင် Cancel နှိပ်ပါ):');
  if (!token) {
    // Report mode — admin ဆီ တိုင်ကြားရုံ toast ပြမည်
    showToast('📩 Report လက်ခံပြီး Admin စစ်ဆေးမည်', true);
    // Optional: report endpoint ခေါ်နိုင်
    return;
  }
  if (!confirm('Review ကို ဖျက်မည်လား?')) return;
  try {
    const r = await fetch(
      `${WORKER_URL}/reviews/${encodeURIComponent(currentAnimeId)}/${encodeURIComponent(revId)}`,
      { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }
    );
    const d = await r.json();
    if (d.success) {
      document.getElementById(`rc-${revId}`)?.remove();
      showToast('✓ ဖျက်ပြီးပါပြီ');
    } else {
      showToast('❌ Password မှားနေသည်', false);
    }
  } catch { showToast('❌ မဖြစ်မြောက်ပါ', false); }
}

function showToast(msg,ok=true) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${ok?'ok':'err'}`;
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── Load Anime Info ───────────────────────────────────
async function loadReview() {
  const container = document.getElementById('reviewContainer');
  try {
    const r = await fetch(WORKER_URL+'/anime');
    const animeData = await r.json();
    const anime = animeData.find(a=>a.id===currentAnimeId);
    // ./images/ → /images/ path fix (moved from root to /review/ subfolder)
if (anime.image) {
  anime.image = anime.image.replace(/^\.\//, '/');
}
    if (!anime) {
      container.innerHTML=`<div class="error-state"><p style="color:#f87171;font-size:16px;font-weight:700">ဇာတ်ကားရှာမတွေ့ပါ</p><a href="/" style="color:var(--blue);font-size:14px;font-weight:600;text-decoration:none;display:block;margin-top:12px">← ပင်မစာမျက်နှာ</a></div>`;
      return;
    }

    // SEO
    const pageTitle = `${anime.title} (${anime.year}) - NaJu Anime Review`;
    document.title  = pageTitle;
    const desc = anime.review ? anime.review.replace(/\s+/g,' ').trim().slice(0,155)+'…'
      : `${anime.title} ဇာတ်ကားကို NaJu Anime Channel တွင် ကြည့်ရှုနိုင်ပါသည်`;
    ['metaTitle','twTitle'].forEach(id=>document.getElementById(id).content=pageTitle);
    ['metaDesc','twDesc'].forEach(id=>document.getElementById(id).content=desc);
    ['metaImage','twImage'].forEach(id=>document.getElementById(id).content=anime.image||'');
    document.getElementById('metaUrl').content=window.location.href;
    const ld={...{"@context":"https://schema.org","@type":"Movie"},name:anime.title,datePublished:anime.year,description:desc,image:anime.image||'',url:window.location.href,genre:anime.genres||[]};
    const s=document.createElement('script');s.type='application/ld+json';s.text=JSON.stringify(ld);document.head.appendChild(s);

    // Genre badges
    const genreBadges = (anime.genres||[]).map(g=>`<span class="genre-badge">${esc(g)}</span>`).join('');

    // Stats
    const stats = [];
    if (anime.episodes) stats.push(`<div class="stat-box"><div class="val">${anime.episodes}</div><div class="lbl">🎬 Episodes</div></div>`);
    stats.push(`<div class="stat-box"><div class="val">${anime.year}</div><div class="lbl">📅 ထုတ်နှစ်</div></div>`);
    const statsHtml = `<div style="display:flex;gap:10px;flex-wrap:wrap">${stats.join('')}</div>`;

    container.innerHTML=`
      <div class="fade-in">
        <div style="display:flex;flex-direction:column;gap:24px">
          <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
            <div class="poster-wrap" style="width:140px;flex-shrink:0">
              <img src="${anime.image||''}" alt="${esc(anime.title)}">
            </div>
            <div style="flex:1;min-width:180px;padding-top:4px;display:flex;flex-direction:column;gap:12px">
              <h1 class="anime-title">${esc(anime.title)}</h1>
              ${genreBadges?`<div style="display:flex;flex-wrap:wrap;gap:6px">${genreBadges}</div>`:''}
              ${statsHtml}
              <a href="${anime.link}" target="_blank" class="watch-btn">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
                Telegram တွင် ကြည့်ရှုရန်
              </a>
            </div>
          </div>
          <div class="review-box">
            <h3>အသေးစိတ်သုံးသပ်ချက်</h3>
            ${(() => {
  const txt = anime.review || 'အသေးစိတ်သုံးသပ်ချက် မရေးသားထားသေးပါ။';
  const LIMIT = 300;
  if (txt.length <= LIMIT) {
    return `<p class="review-text-body">${txt}</p>`;
  }
  return `
    <p class="review-text-body" id="reviewFullText" style="display:none">${txt}</p>
    <p class="review-text-body" id="reviewShortText">${txt.slice(0, LIMIT)}...</p>
    <button onclick="toggleReviewText()" id="reviewToggleBtn"
      style="margin-top:10px;background:none;border:1px solid rgba(59,130,246,.35);
             color:#60a5fa;font-size:13px;font-weight:700;padding:7px 16px;
             border-radius:99px;cursor:pointer;font-family:'Outfit',sans-serif;
             transition:all .15s">
      ▼ ဆက်လက်ဖတ်ရှုရန်
    </button>`;
})()}
          </div>
          <a href="${anime.link}" target="_blank" class="watch-btn" style="max-width:400px;margin:0 auto">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
            Telegram တွင် ယခုပဲ ကြည့်ရှုရန်
          </a>
        </div>
      </div>`;

    document.getElementById('ratingsSection').style.display='block';
    buildStars();
    loadReviews(true);

  } catch(err) {
    container.innerHTML=`<div class="error-state"><p style="color:#f87171;font-size:15px;font-weight:700">ချိတ်ဆက်မှု မအောင်မြင်ပါ</p><p style="font-size:13px;color:#64748b;margin-top:6px">${err.message}</p></div>`;
  }
}

loadReview();

function toggleReviewText() {
  const full  = document.getElementById('reviewFullText');
  const short = document.getElementById('reviewShortText');
  const btn   = document.getElementById('reviewToggleBtn');
  const isOpen = full.style.display === 'block';
  full.style.display  = isOpen ? 'none'  : 'block';
  short.style.display = isOpen ? 'block' : 'none';
  btn.textContent     = isOpen ? '▼ ဆက်လက်ဖတ်ရှုရန်' : '▲ ခဲ့ပြန်ပြ';
}
</script>
