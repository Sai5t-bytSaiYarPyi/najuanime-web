  <style>
    *{font-family:'Outfit',sans-serif;box-sizing:border-box}
    :root{
      --blue:#3b82f6;--blue-dark:#1d4ed8;
      --purple:#a855f7;--purple-dark:#7e22ce;
      --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;
      --border:rgba(255,255,255,0.07);--text:#e2e8f0;--muted:#64748b;
    }
    body{background:var(--bg);color:var(--text);min-height:100vh;}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#334155;border-radius:99px}

    /* ── Header ── */
    header{background:rgba(15,17,23,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
    .logo-naju{color:var(--blue)}.logo-manhwa{color:#c084fc}
    .nav-link{color:#94a3b8;font-weight:600;font-size:14px;transition:color .2s;text-decoration:none}
    .nav-link:hover{color:white}
    .nav-link.active{color:white}

    /* ── Search ── */
    .search-wrap{position:relative}
    .search-wrap input{background:var(--bg3);border:1px solid var(--border);color:white;border-radius:12px;padding:10px 16px 10px 44px;width:100%;font-size:14px;transition:border-color .2s,box-shadow .2s;outline:none}
    .search-wrap input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(168,85,247,.12)}
    .search-wrap input::placeholder{color:var(--muted)}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

    /* ── Section title ── */
    .section-title{font-size:18px;font-weight:700;color:white;display:flex;align-items:center;gap:10px}
    .section-title::before{content:'';display:block;width:4px;height:20px;background:var(--purple);border-radius:99px}

    /* ── Filter chips ── */
    .filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
    .filter-bar::-webkit-scrollbar{display:none}
    .fchip{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:#94a3b8;flex-shrink:0;transition:all .15s;font-family:'Outfit',sans-serif}
    .fchip:hover{border-color:rgba(168,85,247,.4);color:#c084fc}
    .fchip.active{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:#c084fc}
    .fchip.status-ongoing.active{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3);color:#4ade80}
    .fchip.status-completed.active{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.35);color:#60a5fa}
    .fchip.all.active{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:#c084fc}

    /* ── Manhwa Card ── */
    .manhwa-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;display:flex;flex-direction:column;animation:fadeUp .4s ease both;cursor:pointer}
    .manhwa-card:hover{transform:translateY(-4px);border-color:rgba(168,85,247,.35);box-shadow:0 12px 40px rgba(0,0,0,.5)}
    .card-img-wrap{position:relative;overflow:hidden;aspect-ratio:3/4}
    .card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s,opacity .4s}
    .manhwa-card:hover .card-img-wrap img{transform:scale(1.07);opacity:.75}
    .card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 50%);pointer-events:none}
    .card-read{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
    .manhwa-card:hover .card-read{opacity:1}
    .card-read-inner{display:flex;align-items:center;gap:6px;background:rgba(168,85,247,.9);backdrop-filter:blur(6px);color:white;font-size:13px;font-weight:700;padding:9px 18px;border-radius:99px;box-shadow:0 4px 20px rgba(168,85,247,.4)}

    /* Status badge */
    .status-badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.04em;backdrop-filter:blur(4px)}
    .status-badge.ongoing{background:rgba(74,222,128,.85);color:#052e16}
    .status-badge.completed{background:rgba(59,130,246,.85);color:white}
    .status-badge.hiatus{background:rgba(251,146,60,.85);color:#431407}

    /* Chapter badge */
    .ch-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);color:#c084fc;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}

    /* Progress bar (reading history) */
    .progress-strip{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.1)}
    .progress-fill{height:100%;background:linear-gradient(90deg,#a855f7,#3b82f6);border-radius:0 2px 2px 0;transition:width .3s}

    /* Card body */
    .card-body{padding:12px;flex-grow:1;display:flex;flex-direction:column;gap:6px}
    .card-title{font-size:13px;font-weight:700;color:#e2e8f0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px}
    .card-genres{display:flex;flex-wrap:wrap;gap:3px}
    .card-genre-pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);color:#c084fc;white-space:nowrap}
    .card-meta{display:flex;align-items:center;gap:6px;margin-top:auto;padding-top:6px;border-top:1px solid var(--border)}
    .card-meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px}
    .card-updated{font-size:10px;color:#475569;margin-left:auto}

    /* ── Read progress tag (LocalStorage) ── */
    .read-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);color:#4ade80}

    /* ── Empty state ── */
    .empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}

    /* ── Mobile Nav ── */
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(22,27,39,.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:10px 0;z-index:50}
    .mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);text-decoration:none;font-size:10px;font-weight:600;transition:color .2s;flex:1}
    .mobile-nav-item.active,.mobile-nav-item:hover{color:#c084fc}
    .mobile-nav-item svg{width:22px;height:22px}

    /* ── Drawer ── */
    #mobileMenuBtn{color:#94a3b8;background:none;border:none;cursor:pointer}
    #mobileDrawer{background:var(--bg2);border-top:1px solid var(--border)}
    .drawer-link{display:flex;align-items:center;gap:10px;padding:10px 0;color:#94a3b8;text-decoration:none;font-weight:600;font-size:14px;border-bottom:1px solid var(--border);transition:color .2s}
    .drawer-link:hover{color:white}.drawer-link:last-child{border-bottom:none}

    /* ── Skeleton ── */
    .skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel-card{border-radius:16px;overflow:hidden;border:1px solid var(--border)}
    .skel-img{aspect-ratio:3/4;width:100%}
    .skel-body{padding:12px;display:flex;flex-direction:column;gap:8px}
    .skel-line{height:13px;border-radius:6px}
    .skel-line.short{width:60%}
    .skel-line.tiny{height:10px;width:40%}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:640px){
      .card-title{font-size:12px;min-height:32px}
      .card-genre-pill{font-size:9px;padding:1px 5px}
      .card-body{padding:10px;gap:4px}
      .status-badge{font-size:9px;padding:2px 6px}
      .ch-badge{font-size:10px}
      .fchip{font-size:11px;padding:5px 10px}
    }
  </style>
</head>

<script>
const WORKER_URL = 'https://api.najuanime.com';

let allManhwa   = [];
let activeGenre = 'all';
let activeStatus = 'all';  // 'all' | 'ongoing' | 'completed'
let searchTerm  = '';

// ── Reading History (LocalStorage) ──────────────────────
// Format: { [manhwaId]: { lastChapter: 5, totalChapters: 45, updatedAt: '...' } }
function getHistory() {
  try { return JSON.parse(localStorage.getItem('naju_read_history') || '{}'); } catch { return {}; }
}
function getReadProgress(id, totalChapters) {
  const h = getHistory()[id];
  if (!h || !totalChapters) return null;
  return { lastChapter: h.lastChapter, pct: Math.round((h.lastChapter / totalChapters) * 100) };
}

// ── Format date ──────────────────────────────────────────
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return str;
  const now  = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return 'ယနေ့';
  if (diff === 1) return 'မနေ့က';
  if (diff < 7)  return `${diff} ရက်က`;
  if (diff < 30) return `${Math.floor(diff/7)} ပတ်က`;
  return d.toLocaleDateString('my-MM', { month: 'short', day: 'numeric' });
}

// ── Genre Bar ──────────────────────────────────────────
function buildFilterBar(list) {
  const genreCounts = {};
  list.forEach(m => (m.genres || []).forEach(g => { genreCounts[g] = (genreCounts[g] || 0) + 1; }));
  const sortedGenres = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]).map(([g]) => g);

  const bar = document.getElementById('filterBar');
  bar.innerHTML = '';

  const chips = [
    { id: 'all',       label: '📚 အားလုံး',   cls: 'all' },
    { id: 'ongoing',   label: '🟢 Ongoing',   cls: 'status-ongoing' },
    { id: 'completed', label: '✅ Completed',  cls: 'status-completed' },
  ];

  chips.forEach(({ id, label, cls }) => {
    const btn = document.createElement('button');
    const isActive = (id === 'all' && activeGenre === 'all' && activeStatus === 'all') ||
                     (id === 'ongoing' && activeStatus === 'ongoing') ||
                     (id === 'completed' && activeStatus === 'completed');
    btn.className = `fchip ${cls}${isActive ? ' active' : ''}`;
    btn.textContent = label;
    btn.dataset.id  = id;
    btn.onclick = () => {
      if (id === 'ongoing' || id === 'completed') {
        activeStatus = activeStatus === id ? 'all' : id;
        activeGenre  = 'all';
      } else {
        activeStatus = 'all';
        activeGenre  = 'all';
      }
      updateChips();
      applyFilters();
    };
    bar.appendChild(btn);
  });

  // Genre chips
  sortedGenres.forEach(g => {
    const btn = document.createElement('button');
    btn.className = `fchip${activeGenre === g ? ' active' : ''}`;
    btn.textContent = g;
    btn.dataset.genre = g;
    btn.onclick = () => {
      activeGenre  = activeGenre === g ? 'all' : g;
      activeStatus = 'all';
      updateChips();
      applyFilters();
    };
    bar.appendChild(btn);
  });
}

function updateChips() {
  document.querySelectorAll('.fchip[data-id]').forEach(el => {
    const id = el.dataset.id;
    const active =
      (id === 'all' && activeGenre === 'all' && activeStatus === 'all') ||
      (id === 'ongoing'   && activeStatus === 'ongoing') ||
      (id === 'completed' && activeStatus === 'completed');
    el.classList.toggle('active', active);
  });
  document.querySelectorAll('.fchip[data-genre]').forEach(el => {
    el.classList.toggle('active', el.dataset.genre === activeGenre);
  });
}

// ── Filters ────────────────────────────────────────────
function applyFilters() {
  let list = allManhwa;

  if (activeStatus === 'ongoing')
    list = list.filter(m => (m.status || '').toLowerCase() === 'ongoing');
  else if (activeStatus === 'completed')
    list = list.filter(m => (m.status || '').toLowerCase() === 'completed');

  if (activeGenre !== 'all')
    list = list.filter(m => (m.genres || []).includes(activeGenre));

  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    list = list.filter(m =>
      (m.title || '').toLowerCase().includes(q) ||
      (m.titleEN || '').toLowerCase().includes(q) ||
      (m.genres || []).some(g => g.toLowerCase().includes(q))
    );
  }

  renderGrid(list);
}

// ── Render ─────────────────────────────────────────────
function renderGrid(list) {
  const grid = document.getElementById('manhwaGrid');
  document.getElementById('countLabel').textContent = `စုစုပေါင်း ${list.length} ကား`;

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto 16px;color:#475569">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
      <p style="font-size:15px;font-weight:600;color:#64748b">Manhwa မတွေ့ရှိပါ</p>
    </div>`;
    return;
  }

  grid.innerHTML = '';
  list.forEach((manhwa, index) => {
    const card = document.createElement('a');
    card.className   = 'manhwa-card';
    card.href        = `/manhwa/detail/?id=${manhwa.id}`;
    card.style.animationDelay = `${Math.min(index, 20) * 30}ms`;

    const statusCls  = (manhwa.status || '').toLowerCase();
    const statusLbl  = { ongoing: 'Ongoing', completed: 'Completed', hiatus: 'Hiatus' }[statusCls] || manhwa.status || '';
    const genrePills = (manhwa.genres || []).slice(0, 3).map(g => `<span class="card-genre-pill">${g}</span>`).join('');
    const progress   = getReadProgress(manhwa.id, manhwa.totalChapters);
    const readTag    = progress
      ? `<span class="read-tag">📖 Ch.${progress.lastChapter} ဖတ်ပြီး</span>`
      : '';

    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${manhwa.cover || ''}" alt="${manhwa.title}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:var(--bg3);color:var(--muted);font-size:40px">📖</div>
        <div class="card-overlay"></div>
        <div class="card-read">
          <div class="card-read-inner">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            ဖတ်ရန်
          </div>
        </div>
        ${statusLbl ? `<span class="status-badge ${statusCls}">${statusLbl}</span>` : ''}
        ${manhwa.totalChapters ? `<span class="ch-badge">Ch.${manhwa.totalChapters}</span>` : ''}
        ${progress ? `<div class="progress-strip"><div class="progress-fill" style="width:${progress.pct}%"></div></div>` : ''}
      </div>
      <div class="card-body">
        <p class="card-title" title="${manhwa.title}">${manhwa.title}</p>
        ${genrePills ? `<div class="card-genres">${genrePills}</div>` : ''}
        <div class="card-meta">
          ${readTag || `<span class="card-meta-item">
            <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            ${manhwa.totalChapters || 0} Chapters
          </span>`}
          <span class="card-updated">${fmtDate(manhwa.updatedAt)}</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── Skeleton ────────────────────────────────────────────
function renderSkeletons(n = 10) {
  const grid = document.getElementById('manhwaGrid');
  grid.innerHTML = Array.from({ length: n }, () => `
    <div class="skel-card">
      <div class="skeleton skel-img"></div>
      <div class="skel-body">
        <div class="skeleton skel-line"></div>
        <div class="skeleton skel-line short"></div>
        <div class="skeleton skel-line tiny"></div>
      </div>
    </div>`).join('');
}

// ── Search ──────────────────────────────────────────────
function setupSearch() {
  const handle = e => {
    searchTerm = e.target.value;
    const d = document.getElementById('searchDesktop');
    const m = document.getElementById('searchMobile');
    if (d && e.target !== d) d.value = e.target.value;
    if (m && e.target !== m) m.value = e.target.value;
    applyFilters();
  };
  document.getElementById('searchDesktop')?.addEventListener('input', handle);
  document.getElementById('searchMobile')?.addEventListener('input', handle);
}

// ── Load ────────────────────────────────────────────────
async function load() {
  renderSkeletons();
  try {
    const res  = await fetch(WORKER_URL + '/manhwa');
    allManhwa  = await res.json();
    buildFilterBar(allManhwa);
    applyFilters();
    setupSearch();
  } catch (e) {
    document.getElementById('manhwaGrid').innerHTML =
      `<p style="color:#f87171;padding:20px;grid-column:1/-1">Load မရပါ: ${e.message}</p>`;
  }
}

// ── Mobile Menu ─────────────────────────────────────────
document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
  document.getElementById('mobileDrawer')?.classList.toggle('hidden');
});

load();
</script>
</body>
</html>
