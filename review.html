<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaJu Anime Review</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2308080f'/%3E%3Crect x='6' y='6' width='88' height='88' rx='16' fill='none' stroke='%23e8003d' stroke-width='4'/%3E%3Cpath d='M28 25 L28 75 L42 75 L42 42 L58 75 L72 75 L72 25 L58 25 L58 58 L42 25 Z' fill='%23e8003d'/%3E%3C/svg%3E">
  <style>
    body { background:#08080f; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
    .sp { width:36px; height:36px; border:3px solid rgba(255,255,255,.08); border-top-color:#e8003d; border-radius:50%; animation:sp .75s linear infinite; }
    @keyframes sp { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="sp"></div>
  <script>
    // Redirect old review.html?id=xxx links → new SPA hash route
    const id = new URLSearchParams(location.search).get('id');
    if (id) {
      location.replace('index.html#/review/' + encodeURIComponent(id));
    } else {
      location.replace('index.html');
    }
  </script>
</body>
</html>
