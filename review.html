<!DOCTYPE html>
<html lang="my" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ═══ SEO — JS ဖြင့် title/description ကို dynamic ထည့်မည် ═══ -->
    <title>Review - NaJu Anime</title>
    <meta name="description" content="NaJu Anime Review - မြန်မာဘာသာပြန် Anime ဇာတ်ကားများ Telegram တွင် အခမဲ့ ကြည့်ရှုနိုင်ပါသည်">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="NaJu Anime">
    <meta property="og:locale" content="my_MM">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Dynamic OG tags (id="ogTitle" etc.) — JS ဖြင့် ထည့်ပေးမည် -->
    <meta id="metaTitle"       property="og:title"       content="NaJu Anime Review">
    <meta id="metaDesc"        property="og:description"  content="">
    <meta id="metaImage"       property="og:image"        content="">
    <meta id="metaUrl"         property="og:url"          content="">
    <meta id="twTitle"         name="twitter:title"       content="NaJu Anime Review">
    <meta id="twDesc"          name="twitter:description" content="">
    <meta id="twImage"         name="twitter:image"       content="">

    <!-- ═══ Google Analytics 4 — G-XXXXXXXXXX ကို သင့် Measurement ID နဲ့ အစားထိုးပါ ═══ -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Outfit', sans-serif; }
        :root {
            --blue: #3b82f6; --blue-dark: #1d4ed8;
            --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535;
            --border: rgba(255,255,255,0.07);
            --text: #e2e8f0; --muted: #64748b;
        }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }

        header {
            background: rgba(15,17,23,0.9); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600;
            transition: color 0.2s; padding: 6px 0;
        }
        .back-btn:hover { color: var(--blue); }
        .logo-naju { color: var(--blue); }
        .logo-anime { color: white; }

        .poster-wrap {
            border-radius: 16px; overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .poster-wrap img { width: 100%; display: block; }

        .year-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.25);
            color: #60a5fa; font-size: 12px; font-weight: 700;
            padding: 4px 12px; border-radius: 99px; letter-spacing: 0.04em;
        }
        .anime-title {
            font-size: 28px; font-weight: 900; color: white;
            line-height: 1.2; letter-spacing: -0.01em;
        }
        @media (max-width: 640px) { .anime-title { font-size: 22px; } }

        .review-box {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
        }
        .review-box h3 {
            font-size: 14px; font-weight: 700; color: #60a5fa;
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .review-text {
            font-size: 14px; color: #94a3b8;
            line-height: 1.85; text-align: justify; white-space: pre-line;
        }

        .watch-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px;
            background: var(--blue); color: white;
            font-size: 15px; font-weight: 700; border-radius: 14px;
            text-decoration: none; transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(59,130,246,0.3);
        }
        .watch-btn:hover {
            background: var(--blue-dark);
            box-shadow: 0 6px 28px rgba(59,130,246,0.4);
            transform: translateY(-1px);
        }
        .watch-btn:active { transform: scale(0.98); }

        .form-card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 20px; padding: 28px;
        }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
        .form-input, .form-textarea {
            width: 100%; background: var(--bg3); border: 1px solid var(--border);
            color: white; border-radius: 12px; padding: 12px 16px;
            font-size: 14px; font-family: 'Outfit', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none; box-sizing: border-box;
        }
        .form-input:focus, .form-textarea:focus {
            border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .form-input::placeholder, .form-textarea::placeholder { color: #475569; }
        .form-textarea { resize: vertical; min-height: 110px; }
        .submit-btn {
            width: 100%; padding: 14px; background: var(--blue);
            color: white; font-size: 15px; font-weight: 700;
            font-family: 'Outfit', sans-serif; border: none; border-radius: 12px;
            cursor: pointer; transition: background 0.2s, transform 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:hover { background: var(--blue-dark); }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .success-msg {
            display: none; text-align: center; color: #4ade80;
            font-weight: 600; font-size: 14px; padding: 12px;
            background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2);
            border-radius: 10px; margin-top: 12px;
        }

        .loading-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 80px 20px; gap: 16px; color: var(--muted);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border); border-top-color: var(--blue);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-state { text-align: center; padding: 80px 20px; color: #f87171; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease both; }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="back-btn">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                နောက်သို့
            </a>
            <a href="index.html" class="text-lg font-black tracking-tight">
                <span class="logo-naju">NaJu</span><span class="logo-anime">Anime</span>
                <span style="color: var(--muted); font-weight: 600; font-size: 13px; margin-left: 4px;">Review</span>
            </a>
            <div style="width: 80px;"></div>
        </div>
    </header>

    <!-- Review Content -->
    <main class="max-w-4xl mx-auto px-4 py-8" id="reviewContainer">
        <div class="loading-state">
            <div class="spinner"></div>
            <span>Loading...</span>
        </div>
    </main>

    <!-- Feedback Form -->
    <section class="max-w-4xl mx-auto px-4 pb-16" id="feedbackSection" style="display:none;">
        <div class="form-card">
            <h2 style="font-size: 16px; font-weight: 700; color: #60a5fa; margin-bottom: 6px; display: flex; align-items: center; gap: 8px;">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                အကြံပြုရန် / လင့်ခ်သေ တိုင်ကြားရန်
            </h2>
            <p style="font-size: 13px; color: var(--muted); margin-bottom: 20px;">
                စာတန်းထိုး အမှားများ၊ လင့်ခ်သေနေတာများ ရှိပါက အောက်တွင် အကြောင်းကြားနိုင်ပါသည်။
            </p>
            <form id="feedbackForm">
                <input type="hidden" id="animeId" name="animeId">
                <div style="margin-bottom: 16px;">
                    <label class="form-label">အမည် (သို့မဟုတ်) Telegram နာမည်</label>
                    <input type="text" id="userName" name="name" required class="form-input" placeholder="မင်းနာမည်...">
                </div>
                <div style="margin-bottom: 20px;">
                    <label class="form-label">အကြောင်းအရာ</label>
                    <textarea id="userFeedback" name="feedback" required class="form-textarea" placeholder="ဥပမာ - အပိုင်း ၅ လင့်ခ်ပျက်နေပါတယ်..."></textarea>
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    ပေးပို့မည်
                </button>
                <div class="success-msg" id="successMsg">✓ ကျေးဇူးတင်ပါသည်! သင့်အကြံပြုချက်ကို လက်ခံရရှိပါသည်။</div>
            </form>
        </div>
    </section>

    <script>
    // ══════════════════════════════════════════════
    // Worker URL — data.js မသုံးဘဲ KV ကနေ တိုက်ရိုက်ဆွဲ
    // ══════════════════════════════════════════════
    const WORKER_URL = 'https://steep-poetry-db37.izo52928.workers.dev';
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmYLn31_O2ki3pOajB7NQlYmAlBfkaKt_T6hl_rY4Vk8LK-_e2mmTGyNhh09kfCq0/exec";

    const urlParams       = new URLSearchParams(window.location.search);
    const currentAnimeId  = urlParams.get('id');
    const container       = document.getElementById('reviewContainer');
    const feedbackSection = document.getElementById('feedbackSection');

    async function loadReview() {
        try {
            // KV ကနေ anime list အကုန်ဆွဲ
            const r        = await fetch(WORKER_URL + '/anime');
            const animeData = await r.json();
            const anime    = animeData.find(a => a.id === currentAnimeId);

            if (anime) {
                // ─── SEO — Dynamic Title & OG Tags ───
                const pageTitle = `${anime.title} (${anime.year}) - NaJu Anime Review`;
                document.title = pageTitle;

                const desc = anime.review
                    ? anime.review.replace(/\s+/g,' ').trim().slice(0,155) + '…'
                    : `${anime.title} ဇာတ်ကားကို NaJu Anime Channel တွင် Telegram မှတဆင့် ကြည့်ရှုနိုင်ပါသည်`;

                document.getElementById('metaTitle').content  = pageTitle;
                document.getElementById('metaDesc').content   = desc;
                document.getElementById('metaImage').content  = anime.image || '';
                document.getElementById('metaUrl').content    = window.location.href;
                document.getElementById('twTitle').content    = pageTitle;
                document.getElementById('twDesc').content     = desc;
                document.getElementById('twImage').content    = anime.image || '';

                // ─── JSON-LD Structured Data ───
                const ld = {
                    "@context": "https://schema.org",
                    "@type": "Movie",
                    "name": anime.title,
                    "datePublished": anime.year,
                    "description": desc,
                    "image": anime.image || '',
                    "url": window.location.href,
                    "publisher": { "@type": "Organization", "name": "NaJu Anime", "url": "https://www.najuanime.com" }
                };
                const ldScript = document.createElement('script');
                ldScript.type = 'application/ld+json';
                ldScript.text = JSON.stringify(ld);
                document.head.appendChild(ldScript);

                // ─── Feedback Form ───
                document.getElementById('animeId').value = anime.title;
                feedbackSection.style.display = 'block';

                // ─── Render Review ───
                container.innerHTML = `
                    <div class="fade-in">
                        <div style="display: flex; flex-direction: column; gap: 28px;">
                            <div style="display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">
                                <div class="poster-wrap" style="width: 140px; flex-shrink: 0;">
                                    <img src="${anime.image}" alt="${anime.title}">
                                </div>
                                <div style="flex: 1; min-width: 180px; padding-top: 4px;">
                                    <span class="year-pill" style="margin-bottom: 14px;">
                                        <svg width="10" height="10" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
                                        ${anime.year}
                                    </span>
                                    <h1 class="anime-title" style="margin: 12px 0 20px;">${anime.title}</h1>
                                    <a href="${anime.link}" target="_blank" class="watch-btn">
                                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
                                        Telegram တွင် ကြည့်ရှုရန်
                                    </a>
                                </div>
                            </div>

                            <div class="review-box">
                                <h3>ဇာတ်လမ်းအကျဉ်း</h3>
                                <p class="review-text">${anime.review || "ယခု ဇာတ်ကားအတွက် ဇာတ်လမ်းအကျဉ်း မရေးသားထားသေးပါ။ Telegram Channel တွင် ဝင်ရောက်ကြည့်ရှုနိုင်ပါသည်။"}</p>
                            </div>

                            <a href="${anime.link}" target="_blank" class="watch-btn" style="max-width: 400px; margin: 0 auto;">
                                <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
                                Telegram တွင် ယခုပဲ ကြည့်ရှုရန်
                            </a>
                        </div>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="error-state">
                        <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin: 0 auto 16px; color: #f87171;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                        <p style="font-size: 16px; font-weight: 700; color: #f87171;">ဇာတ်ကားရှာမတွေ့ပါ</p>
                        <a href="index.html" style="margin-top: 16px; display: inline-flex; align-items: center; gap: 6px; color: #3b82f6; font-size: 14px; font-weight: 600; text-decoration: none;">
                            ← ပင်မစာမျက်နှာသို့ ပြန်သွားရန်
                        </a>
                    </div>`;
            }
        } catch(err) {
            container.innerHTML = `
                <div class="error-state">
                    <p style="font-size: 15px; font-weight: 700; color: #f87171;">ချိတ်ဆက်မှု မအောင်မြင်ပါ</p>
                    <p style="font-size: 13px; color: #64748b; margin-top: 8px;">${err.message}</p>
                    <a href="index.html" style="margin-top: 16px; display: inline-flex; align-items: center; gap: 6px; color: #3b82f6; font-size: 14px; font-weight: 600; text-decoration: none;">
                        ← ပင်မစာမျက်နှာသို့ ပြန်သွားရန်
                    </a>
                </div>`;
        }
    }

    // Feedback form
    const form      = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');

    if (form) {
        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<svg width="16" height="16" style="animation: spin 0.8s linear infinite;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> ပေးပို့နေပါသည်...`;
            fetch(SCRIPT_URL, { method: 'POST', body: new FormData(form) })
                .then(() => {
                    successMsg.style.display = 'block';
                    form.reset();
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg> ပေးပို့မည်`;
                    setTimeout(() => successMsg.style.display = 'none', 4000);
                })
                .catch(() => {
                    alert("အင်တာနက် ချိတ်ဆက်မှု အဆင်မပြေပါ။ ပြန်ကြိုးစားပါ။");
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg> ပေးပို့မည်`;
                });
        });
    }

    loadReview();
    </script>
</body>
</html>
