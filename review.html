<!DOCTYPE html>
<html lang="my" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review - NaJu Anime</title>
  <meta name="description" content="NaJu Anime Review - မြန်မာဘာသာပြန် Anime ဇာတ်ကားများ Telegram တွင် အခမဲ့ ကြည့်ရှုနိုင်ပါသည်">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="NaJu Anime">
  <meta property="og:locale" content="my_MM">
  <meta name="twitter:card" content="summary_large_image">
  <meta id="metaTitle"  property="og:title"       content="NaJu Anime Review">
  <meta id="metaDesc"   property="og:description"  content="">
  <meta id="metaImage"  property="og:image"        content="">
  <meta id="metaUrl"    property="og:url"          content="">
  <meta id="twTitle"    name="twitter:title"       content="NaJu Anime Review">
  <meta id="twDesc"     name="twitter:description" content="">
  <meta id="twImage"    name="twitter:image"       content="">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBNCZMJS9F"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-NBNCZMJS9F');</script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *{font-family:'Outfit',sans-serif;}
    :root{--blue:#3b82f6;--blue-dark:#1d4ed8;--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:rgba(255,255,255,0.07);--text:#e2e8f0;--muted:#64748b;}
    body{background:var(--bg);color:var(--text);min-height:100vh;}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#334155;border-radius:99px}

    header{background:rgba(15,17,23,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
    .back-btn{display:flex;align-items:center;gap:6px;color:#94a3b8;text-decoration:none;font-size:14px;font-weight:600;transition:color .2s;padding:6px 0}
    .back-btn:hover{color:var(--blue)}
    .logo-naju{color:var(--blue)}.logo-anime{color:white}

    .poster-wrap{border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.6)}
    .poster-wrap img{width:100%;display:block}

    .year-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#60a5fa;font-size:12px;font-weight:700;padding:4px 12px;border-radius:99px;letter-spacing:.04em}
    .anime-title{font-size:28px;font-weight:900;color:white;line-height:1.2;letter-spacing:-.01em}
    @media(max-width:640px){.anime-title{font-size:22px}}

    .genre-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);color:#c084fc}

    .stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;text-align:center;flex:1}
    .stat-box .val{font-size:18px;font-weight:900;color:white;line-height:1.2}
    .stat-box .lbl{font-size:11px;font-weight:600;color:var(--muted);margin-top:2px}

    .review-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px}
    .review-box h3{font-size:14px;font-weight:700;color:#60a5fa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    .review-text{font-size:14px;color:#94a3b8;line-height:1.85;text-align:justify;white-space:pre-line}

    .watch-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:var(--blue);color:white;font-size:15px;font-weight:700;border-radius:14px;text-decoration:none;transition:background .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 20px rgba(59,130,246,.3)}
    .watch-btn:hover{background:var(--blue-dark);box-shadow:0 6px 28px rgba(59,130,246,.4);transform:translateY(-1px)}
    .watch-btn:active{transform:scale(.98)}

    /* ── Rating Stars ── */
    .star-row{display:flex;gap:6px;align-items:center}
    .star{width:32px;height:32px;cursor:pointer;color:#334155;transition:color .15s,transform .15s;flex-shrink:0}
    .star:hover,.star.active{color:#fbbf24;transform:scale(1.15)}
    .star svg{width:100%;height:100%}

    /* ── Rating & Review Form ── */
    .rating-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px}
    .form-label{display:block;font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:8px}
    .form-input,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:white;border-radius:12px;padding:12px 16px;font-size:14px;font-family:'Outfit',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none;box-sizing:border-box}
    .form-input:focus,.form-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
    .form-input::placeholder,.form-textarea::placeholder{color:#475569}
    .form-textarea{resize:vertical;min-height:100px}
    .submit-btn{width:100%;padding:14px;background:var(--blue);color:white;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;border:none;border-radius:12px;cursor:pointer;transition:background .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:8px}
    .submit-btn:hover{background:var(--blue-dark)}.submit-btn:active{transform:scale(.98)}.submit-btn:disabled{opacity:.6;cursor:not-allowed}

    /* ── User Review Cards ── */
    .user-review-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px}
    .user-review-card .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .user-review-card .uname{font-size:13px;font-weight:700;color:white}
    .user-review-card .udate{font-size:11px;color:var(--muted)}
    .rating-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);color:#fbbf24;font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px}
    .user-review-card .utext{font-size:13px;color:#94a3b8;line-height:1.7}

    /* ── Avg Score Display ── */
    .avg-score-box{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:14px;padding:16px;text-align:center}
    .avg-score-num{font-size:36px;font-weight:900;color:#fbbf24;line-height:1}
    .avg-score-sub{font-size:12px;color:#92400e;margin-top:4px;font-weight:600}
    .mini-stars{display:flex;gap:3px;justify-content:center;margin-top:6px}
    .mini-star{width:14px;height:14px;color:#fbbf24}
    .mini-star.empty{color:#334155}

    .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(--muted)}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-state{text-align:center;padding:80px 20px;color:#f87171}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .4s ease both}

    .success-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2e1a;border:1px solid rgba(74,222,128,.3);color:#4ade80;font-size:14px;font-weight:700;padding:12px 24px;border-radius:99px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:99;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
    .success-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="back-btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        နောက်သို့
      </a>
      <a href="index.html" class="text-lg font-black tracking-tight">
        <span class="logo-naju">NaJu</span><span class="logo-anime">Anime</span>
        <span style="color:var(--muted);font-weight:600;font-size:13px;margin-left:4px">Review</span>
      </a>
      <div style="width:80px"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-8" id="reviewContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Loading...</span>
    </div>
  </main>

  <!-- Rating & Reviews Section -->
  <section class="max-w-4xl mx-auto px-4 pb-16" id="ratingsSection" style="display:none">

    <!-- Submit Rating -->
    <div class="rating-card" style="margin-bottom:24px">
      <h2 style="font-size:16px;font-weight:700;color:#fbbf24;margin-bottom:4px;display:flex;align-items:center;gap:8px">
        ⭐ Rating နှင့် Review ပေးရန်
      </h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:20px">ဇာတ်ကားကို ကြည့်ပြီးပြီဆိုရင် Rating နဲ့ Review ပေးသွားပါ ✨</p>

      <div style="margin-bottom:18px">
        <label class="form-label">⭐ သင့် Rating (1–10)</label>
        <div class="star-row" id="starRow">
          <!-- stars injected by JS -->
        </div>
        <p id="ratingLabel" style="font-size:13px;color:#fbbf24;margin-top:8px;font-weight:700;min-height:20px"></p>
      </div>

      <div style="margin-bottom:14px">
        <label class="form-label">အမည် (မဖြစ်မနေမဟုတ်)</label>
        <input type="text" id="rName" class="form-input" placeholder="မင်းနာမည် သို့မဟုတ် Telegram username...">
      </div>

      <div style="margin-bottom:20px">
        <label class="form-label">Review (မဖြစ်မနေမဟုတ်)</label>
        <textarea id="rText" class="form-textarea" placeholder="ဇာတ်ကားအကြောင်း သင်ထင်တာတွေ မျှဝေပြောပြပေးပါ..."></textarea>
      </div>

      <button id="submitRating" class="submit-btn" onclick="submitRating()">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        Rating ပေးမည်
      </button>
    </div>

    <!-- Reviews List -->
    <div id="reviewsList">
      <div class="loading-state" style="padding:40px 20px">
        <div class="spinner" style="width:24px;height:24px;border-width:2px"></div>
      </div>
    </div>
  </section>

  <!-- Toast -->
  <div id="toast" class="success-toast"></div>

<script>
const WORKER_URL     = 'https://steep-poetry-db37.izo52928.workers.dev';
const urlParams      = new URLSearchParams(window.location.search);
const currentAnimeId = urlParams.get('id');
const container      = document.getElementById('reviewContainer');
const ratingsSection = document.getElementById('ratingsSection');

let selectedRating = 0;

const RATING_LABELS = {
  1:'😭 အလွန်မကောင်းဘူး', 2:'😞 မကောင်းဘူး', 3:'😐 သာမာန်',
  4:'🙂 ရပါတယ်', 5:'😊 တော်တော်ကောင်းတယ်',
  6:'😄 ကောင်းတယ်', 7:'🤩 အရမ်းကောင်းတယ်',
  8:'🔥 မိုက်တယ်!', 9:'💥 Top-tier!', 10:'👑 မာစတာပီး!'
};

// ── Stars UI ─────────────────────────────────────────
function buildStars() {
  const row = document.getElementById('starRow');
  row.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const span = document.createElement('span');
    span.className = 'star';
    span.dataset.val = i;
    span.innerHTML = `<svg viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`;
    span.addEventListener('mouseenter', () => highlightStars(i));
    span.addEventListener('mouseleave', () => highlightStars(selectedRating));
    span.addEventListener('click', () => {
      selectedRating = i;
      highlightStars(i);
      document.getElementById('ratingLabel').textContent = RATING_LABELS[i] || '';
    });
    row.appendChild(span);
  }
}

function highlightStars(n) {
  document.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('active', Number(s.dataset.val) <= n);
  });
}

// ── Avg Score Display ─────────────────────────────────
function renderAvgScore(reviews) {
  if (!reviews.length) return '';
  const avg = (reviews.reduce((s,r)=>s+r.rating,0) / reviews.length).toFixed(1);
  const filled = Math.round(avg / 2); // out of 5 stars for display
  const stars = Array.from({length:5}, (_,i) =>
    `<svg class="mini-star${i < filled ? '' : ' empty'}" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`
  ).join('');
  return `
    <div class="avg-score-box">
      <div class="avg-score-num">${avg}</div>
      <div class="mini-stars">${stars}</div>
      <div class="avg-score-sub">User ${reviews.length} ယောက် Rating ပေး</div>
    </div>`;
}

// ── Render Reviews List ───────────────────────────────
function renderReviews(reviews) {
  const el = document.getElementById('reviewsList');
  if (!reviews.length) {
    el.innerHTML = `
      <div style="text-align:center;padding:40px 20px;color:var(--muted)">
        <div style="font-size:32px;margin-bottom:10px">💬</div>
        <p style="font-size:14px;font-weight:600">Review မရှိသေးဘူး</p>
        <p style="font-size:12px;margin-top:4px">ပထမဦးဆုံး Rating ပေးသူ ဖြစ်ပါ!</p>
      </div>`;
    return;
  }

  const avgHtml = renderAvgScore(reviews);
  const cards = reviews.map(r => {
    const stars = Array.from({length:10},(_,i)=>
      `<svg style="width:10px;height:10px;color:${i<r.rating?'#fbbf24':'#334155'}" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`
    ).join('');
    return `
      <div class="user-review-card">
        <div class="meta">
          <span class="uname">👤 ${escHtml(r.name||'Anonymous')}</span>
          <span class="rating-badge">⭐ ${r.rating}/10</span>
          <span style="display:flex;gap:2px;align-items:center">${stars}</span>
          <span class="udate">${r.date||''}</span>
        </div>
        ${r.text ? `<p class="utext">${escHtml(r.text)}</p>` : ''}
      </div>`;
  }).join('');

  el.innerHTML = `
    <h3 style="font-size:15px;font-weight:700;color:white;margin-bottom:14px;display:flex;align-items:center;gap:8px">
      ⭐ User Reviews <span style="font-size:12px;font-weight:600;color:var(--muted)">(${reviews.length})</span>
    </h3>
    ${avgHtml}
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">${cards}</div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Submit Rating ─────────────────────────────────────
async function submitRating() {
  if (!selectedRating) {
    showToast('⚠️ Star နှိပ်ပြီး Rating ပေးပါ!', false);
    return;
  }
  const btn  = document.getElementById('submitRating');
  const name = document.getElementById('rName').value.trim();
  const text = document.getElementById('rText').value.trim();

  btn.disabled = true;
  btn.innerHTML = `<svg style="animation:spin .8s linear infinite" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> ပေးပို့နေသည်...`;

  try {
    const r = await fetch(`${WORKER_URL}/reviews/${encodeURIComponent(currentAnimeId)}`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name, rating: selectedRating, text }),
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || 'Error');

    showToast('✓ Rating ပေးပြီးပါပြီ! ကျေးဇူးတင်ပါတယ် 🙏');
    document.getElementById('rName').value = '';
    document.getElementById('rText').value = '';
    selectedRating = 0;
    highlightStars(0);
    document.getElementById('ratingLabel').textContent = '';
    loadReviews(); // refresh reviews
  } catch(err) {
    showToast('❌ အင်တာနက် ချိတ်ဆက်မှု မအောင်မြင်ပါ', false);
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg> Rating ပေးမည်`;
}

function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#1a2e1a' : '#2e1a1a';
  t.style.color = ok ? '#4ade80' : '#f87171';
  t.style.borderColor = ok ? 'rgba(74,222,128,.3)' : 'rgba(248,113,113,.3)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Load Reviews ──────────────────────────────────────
async function loadReviews() {
  try {
    const r       = await fetch(`${WORKER_URL}/reviews/${encodeURIComponent(currentAnimeId)}`);
    const reviews = await r.json();
    renderReviews(reviews);
  } catch {
    document.getElementById('reviewsList').innerHTML =
      '<p style="color:#f87171;font-size:13px;padding:20px">Reviews load မရပါ</p>';
  }
}

// ── Load Anime ────────────────────────────────────────
async function loadReview() {
  try {
    const r         = await fetch(WORKER_URL + '/anime');
    const animeData = await r.json();
    const anime     = animeData.find(a => a.id === currentAnimeId);

    if (anime) {
      // SEO
      const pageTitle = `${anime.title} (${anime.year}) - NaJu Anime Review`;
      document.title  = pageTitle;
      const desc = anime.review
        ? anime.review.replace(/\s+/g,' ').trim().slice(0,155)+'…'
        : `${anime.title} ဇာတ်ကားကို NaJu Anime Channel တွင် Telegram မှတဆင့် ကြည့်ရှုနိုင်ပါသည်`;
      document.getElementById('metaTitle').content  = pageTitle;
      document.getElementById('metaDesc').content   = desc;
      document.getElementById('metaImage').content  = anime.image||'';
      document.getElementById('metaUrl').content    = window.location.href;
      document.getElementById('twTitle').content    = pageTitle;
      document.getElementById('twDesc').content     = desc;
      document.getElementById('twImage').content    = anime.image||'';

      // JSON-LD
      const ld = {"@context":"https://schema.org","@type":"Movie","name":anime.title,"datePublished":anime.year,"description":desc,"image":anime.image||'',"url":window.location.href,"genre":anime.genres||[],"publisher":{"@type":"Organization","name":"NaJu Anime","url":"https://www.najuanime.com"}};
      const ldScript = document.createElement('script');
      ldScript.type='application/ld+json'; ldScript.text=JSON.stringify(ld);
      document.head.appendChild(ldScript);

      ratingsSection.style.display = 'block';

      // Genre badges
      const genreBadges = (anime.genres||[]).map(g=>`<span class="genre-badge">${g}</span>`).join('');

      // Stat boxes — year + episodes only (score comes from users now)
      const stats = [];
      if (anime.episodes) stats.push(`<div class="stat-box"><div class="val">${anime.episodes}</div><div class="lbl">🎬 Episodes</div></div>`);
      stats.push(`<div class="stat-box"><div class="val">${anime.year}</div><div class="lbl">📅 ထုတ်လုပ်သည့်နှစ်</div></div>`);
      const statsHtml = `<div style="display:flex;gap:10px;flex-wrap:wrap">${stats.join('')}</div>`;

      container.innerHTML = `
        <div class="fade-in">
          <div style="display:flex;flex-direction:column;gap:24px">
            <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
              <div class="poster-wrap" style="width:140px;flex-shrink:0">
                <img src="${anime.image||''}" alt="${anime.title}">
              </div>
              <div style="flex:1;min-width:180px;padding-top:4px;display:flex;flex-direction:column;gap:12px">
                <h1 class="anime-title">${anime.title}</h1>
                ${genreBadges ? `<div style="display:flex;flex-wrap:wrap;gap:6px">${genreBadges}</div>` : ''}
                ${statsHtml}
                <a href="${anime.link}" target="_blank" class="watch-btn">
                  <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
                  Telegram တွင် ကြည့်ရှုရန်
                </a>
              </div>
            </div>

            <div class="review-box">
              <h3>ဇာတ်လမ်းအကျဉ်း</h3>
              <p class="review-text">${anime.review || "ယခု ဇာတ်ကားအတွက် ဇာတ်လမ်းအကျဉ်း မရေးသားထားသေးပါ။ Telegram Channel တွင် ဝင်ရောက်ကြည့်ရှုနိုင်ပါသည်။"}</p>
            </div>

            <a href="${anime.link}" target="_blank" class="watch-btn" style="max-width:400px;margin:0 auto">
              <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
              Telegram တွင် ယခုပဲ ကြည့်ရှုရန်
            </a>
          </div>
        </div>`;

      buildStars();
      loadReviews();
    } else {
      container.innerHTML = `<div class="error-state"><svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto 16px;color:#f87171"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg><p style="font-size:16px;font-weight:700;color:#f87171">ဇာတ်ကားရှာမတွေ့ပါ</p><a href="index.html" style="margin-top:16px;display:inline-flex;align-items:center;gap:6px;color:#3b82f6;font-size:14px;font-weight:600;text-decoration:none">← ပင်မစာမျက်နှာသို့ ပြန်သွားရန်</a></div>`;
    }
  } catch(err) {
    container.innerHTML = `<div class="error-state"><p style="font-size:15px;font-weight:700;color:#f87171">ချိတ်ဆက်မှု မအောင်မြင်ပါ</p><p style="font-size:13px;color:#64748b;margin-top:8px">${err.message}</p><a href="index.html" style="margin-top:16px;display:inline-flex;align-items:center;gap:6px;color:#3b82f6;font-size:14px;font-weight:600;text-decoration:none">← ပင်မစာမျက်နှာသို့ ပြန်သွားရန်</a></div>`;
  }
}

loadReview();
</script>
</body>
</html>
